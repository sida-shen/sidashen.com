<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sida Shen — Content Portfolio</title>
<meta name="description" content="Sida Shen's content portfolio: 119 blog posts, talks, webinars, and interviews on real-time analytics, data lakehouses, and developer marketing.">
<meta property="og:title" content="Sida Shen — Content Portfolio">
<meta property="og:description" content="70 blog posts, 45 talks & webinars, 4 interviews on real-time analytics, Apache Iceberg, and data lakehouses.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sidashen.com/content">
<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --text: #1a1a2e;
    --muted: #64748b;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --border: #e2e8f0;
    --section-blog: #2563eb;
    --section-video: #e11d48;
    --section-interview: #dc2626;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .hero {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    color: #fff;
    padding: 64px 24px 56px;
    text-align: center;
  }
  .hero h1 {
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .hero .tagline {
    font-size: 1.05rem;
    color: #94a3b8;
    font-weight: 400;
    margin-bottom: 28px;
  }
  .hero .profiles {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
  }
  .hero .profiles a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #cbd5e1;
    text-decoration: none;
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .hero .profiles a:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
    padding: 28px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .stat { text-align: center; }
  .stat .num {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--accent);
  }
  .stat .label {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 2px;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .section { margin-bottom: 40px; }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px 12px 0 0;
    user-select: none;
    transition: background 0.15s;
  }
  .section-header:hover { background: #f8fafc; }
  .section.collapsed .section-header { border-radius: 12px; }
  .section-header h2 {
    font-size: 1.1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-header .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .section-header .count {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .section-header .chevron {
    font-size: 1.2rem;
    color: var(--muted);
    transition: transform 0.2s;
  }
  .section.collapsed .chevron { transform: rotate(-90deg); }

  .section-body {
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
    background: var(--surface);
  }
  .section.collapsed .section-body { display: none; }

  .item-list { list-style: none; }
  .item-list li {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 11px 20px;
    border-bottom: 1px solid #f1f5f9;
    font-size: 0.92rem;
    transition: background 0.1s;
  }
  .item-list li:last-child { border-bottom: none; }
  .item-list li:hover { background: #f8fafc; }
  .item-list .num {
    color: var(--muted);
    font-size: 0.78rem;
    font-variant-numeric: tabular-nums;
    min-width: 22px;
    text-align: right;
    flex-shrink: 0;
  }
  .item-list a {
    color: var(--text);
    text-decoration: none;
    flex: 1;
  }
  .item-list a:hover { color: var(--accent); }
  .item-list .pub {
    color: var(--muted);
    font-size: 0.78rem;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .item-list .date {
    color: var(--muted);
    font-size: 0.78rem;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .playlist-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    font-size: 0.85rem;
    color: var(--muted);
    border-bottom: 1px solid #f1f5f9;
    width: 100%;
  }
  .playlist-link a {
    color: var(--accent);
    text-decoration: none;
  }
  .playlist-link a:hover { text-decoration: underline; }

  footer {
    text-align: center;
    padding: 32px 24px;
    color: var(--muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 640px) {
    .hero h1 { font-size: 1.8rem; }
    .stats-bar { gap: 20px; }
    .stat .num { font-size: 1.4rem; }
    .item-list li { padding: 10px 14px; font-size: 0.87rem; }
  }
</style>
</head>
<body>

<div class="hero">
  <h1>Sida Shen</h1>
  <p class="tagline">Product Marketing Manager at CelerData &middot; StarRocks &middot; Lakehouse &middot; Real-Time Analytics &middot; AI Agents</p>
  <div class="profiles">
    <a target="_blank" rel="noopener" href="https://sidashen.com">sidashen.com</a>
    <a target="_blank" rel="noopener" href="https://celerdata.com/blog/author/sida-shen">CelerData Blog</a>
    <a target="_blank" rel="noopener" href="https://www.starrocks.io/blog/author/sida-shen">StarRocks Blog</a>
    <a target="_blank" rel="noopener" href="https://thenewstack.io/author/sida-shen/">The New Stack</a>
    <a target="_blank" rel="noopener" href="https://medium.com/starrocks-engineering">Medium</a>
    <a target="_blank" rel="noopener" href="https://www.linkedin.com/in/sida-shen-165303193/">LinkedIn</a>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="container" id="content-container"></div>

<footer id="footer"></footer>

<script src="../js/content-data.js?v=9"></script>
<script>
(function() {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  // --- Stats bar ---
  const sources = ContentUtils.sources();
  const counts = ContentUtils.countByType();
  const statsHtml = [
    { num: counts.blog, label: 'Blog Posts' },
    { num: counts.video, label: 'Talks & Webinars' },
    { num: counts.interview, label: 'Interviews' },
    { num: ContentUtils.totalCount(), label: 'Total' },
  ].map(s => '<div class="stat"><div class="num">' + s.num + '</div><div class="label">' + s.label + '</div></div>').join('');
  document.getElementById('stats-bar').innerHTML = statsHtml;

  // --- Sections ---
  const sections = [
    { id: 'blog', title: 'Blog Posts', color: 'var(--section-blog)', items: ContentUtils.byType('blog') },
    { id: 'video', title: 'Talks & Webinars', color: 'var(--section-video)', items: ContentUtils.byType('video') },
    { id: 'interview', title: 'Interviews & Press', color: 'var(--section-interview)', items: ContentUtils.byType('interview') },
  ];

  const container = document.getElementById('content-container');

  for (const sec of sections) {
    const div = document.createElement('div');
    div.className = 'section';
    div.id = sec.id;

    let listHtml = '';
    sec.items.forEach((item, i) => {
      const pub = item.source !== 'CelerData Blog' && item.source !== 'StarRocks Blog' ? '<span class="pub">' + esc(item.source) + '</span>' : '';
      const date = item.date !== '2022-01' ? '<span class="date">' + esc(item.date) + '</span>' : '';
      listHtml += '<li><span class="num">' + (i+1) + '</span><a target="_blank" rel="noopener" href="' + esc(item.url) + '">' + esc(item.title) + '</a>' + pub + date + '</li>';
    });

    let playlistHtml = '';
    if (sec.id === 'video') {
      playlistHtml = '<div class="playlist-link">Full playlist: <a target="_blank" rel="noopener" href="https://www.youtube.com/playlist?list=PLTXHtKIqm__dqxZYV8oQ-l7tRpSnftjmy">youtube.com/playlist</a></div>';
    }

    div.innerHTML =
      '<div class="section-header" onclick="this.parentElement.classList.toggle(\'collapsed\')">' +
        '<h2><span class="dot" style="background:' + sec.color + '"></span>' + esc(sec.title) + '<span class="count">' + sec.items.length + '</span></h2>' +
        '<span class="chevron">&#9662;</span>' +
      '</div>' +
      '<div class="section-body">' + playlistHtml + '<ol class="item-list">' + listHtml + '</ol></div>';

    container.appendChild(div);
  }

  // --- Footer ---
  const now = new Date();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('footer').textContent = 'Last updated: ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
})();
</script>

<noscript>
  <div style="padding:2rem;text-align:center;color:#64748b;">
    This page requires JavaScript to render content. <a href="https://sidashen.com">Visit sidashen.com</a> instead.
  </div>
</noscript>

</body>
</html>
