<body>

  <!-- ========== Top Panel ========== -->
  <div id="top-panel">
    <div id="panel-left">
      <button id="activities-btn">Activities</button>
    </div>
    <div id="panel-center">
      <span id="panel-clock"></span>
    </div>
    <div id="panel-right">
      <span class="tray-icon">🔊</span>
      <span class="tray-icon">🔋</span>
      <span class="tray-icon">⏻</span>
    </div>
  </div>

  <!-- ========== Activities Menu (outside top-panel to avoid stacking context) ========== -->
  <div id="activities-menu" class="panel-menu hidden">
    <div class="panel-menu-item" data-action="terminal">❯_ Terminal</div>
    <div class="panel-menu-item" data-action="files">📁 Files</div>
    <div class="panel-menu-sep"></div>
    <div class="panel-menu-item" data-action="about">📄 About</div>
    <div class="panel-menu-item" data-action="contact">✉️ Contact</div>
    <div class="panel-menu-sep"></div>
    <div class="panel-menu-label">Theme</div>
    <div class="panel-menu-item" data-action="theme-green">● Green</div>
    <div class="panel-menu-item" data-action="theme-amber">● Amber</div>
    <div class="panel-menu-item" data-action="theme-blue">● Blue</div>
    <div class="panel-menu-item" data-action="theme-white">● White</div>
    <div class="panel-menu-item" data-action="theme-dracula">● Dracula</div>
  </div>

  <!-- ========== Desktop (Window Container) ========== -->
  <div id="desktop"></div>

  <!-- ========== Dock ========== -->
  <div id="dock">
    <div class="dock-icon" id="dock-terminal" title="Terminal">
      <div class="dock-icon-inner terminal-icon">❯_</div>
    </div>
    <div class="dock-icon" id="dock-files" title="Files">
      <div class="dock-icon-inner files-icon">📁</div>
    </div>
    <div class="dock-separator"></div>
  </div>

  <!-- ========== No-JS Fallback ========== -->
  <noscript>
    <div style="font-family:monospace;padding:2rem;max-width:700px;margin:0 auto;">

      <h2>Experience</h2>
      <ul>
        <li><strong>CelerData Inc.</strong> — Product Marketing Manager (2023–Present)</li>
        <li><strong>CelerData Inc.</strong> — Product Manager (2022–2023)</li>
        <li><strong>Zilliz</strong> — Solution Architect (2021–2022)</li>
        <li><strong>REEL</strong> — Founding Data Scientist (2020–2021)</li>
      </ul>
      <h2>Contact</h2>
      <p>Email: shenstan1@gmail.com | LinkedIn: linkedin.com/in/sida-shen-165303193/</p>
    </div>

  <script src="js/app-explorer.js"></script>
  <script src="js/app-viewer.js"></script>
  <script src="js/desktop.js"></script>
</body>
</html>
